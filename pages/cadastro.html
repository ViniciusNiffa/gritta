<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon/png" href="./img/favicon-16x16.png" />
    <title>Gr!tta | Cadastro</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    <script src="../js/menu.js"></script>
</head>

<body>
    <a href="/"><img src="../img/icon_voltar.png" id="voltar" alt="voltar"></a>
    <section id="secCadastro">
        <article id="artFormulario">
            <h1 id="h1Cad">Cadastro</h1>
            <form action="{{ url_for('fale_conosco') }}" method="post">
                <fieldset class="classForm" id="formulario">  
                    <div class="dados">
                        <input type="text" id="nome" name="nome" placeholder="" required>
                        <label>* Nome</label>
                    </div>

                    <div class="dados">
                        <input type="text" id="snome" name="snome" placeholder="" required>
                        <label>* Sobrenome</label>
                    </div>

                    <div class="dados">
                        <input type="text" id="usuario" name="usuario" placeholder="" required>
                        <label>* Usuário</label>
                    </div>

                    <div class="dados">
                        <input type="date" id="data_nasc" name="data_nasc" placeholder="" required>
                        <label>* Data de nascimento</label>
                    </div>

                    
                    <div class="dados">
                        <input type="text" id="cpf" name="cpf" placeholder="" required>
                        <label>* CPF</label>
                    </div>
                    
                    <div class="dados">
                        <input type="tel" id="tel" name="tel" placeholder="" required>
                        <label>* Telefone</label>
                    </div>

                    <div class="dados">
                        <input type="email" id="email" name="email" placeholder="" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
                        required>
                        <label>* E-mail</label>
                    </div>

                    <div class="dados">
                        <input type="password" id="senha" name="senha" placeholder="" required>
                        <label>* Senha</label>
                    </div>
                    <button type="submit" class="botao" name="cadastrar">
                        Cadastrar
                    </button>
                </fieldset>
            </form>
        </article>
    </section>

</body>

</html>
