<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="icon/png" href="./img/favicon-16x16.png" />
    <title>Gr!tta | Cadastro</title>
    <link rel="stylesheet" href="../css/reset.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link rel="stylesheet" href="../css/cadastro.css">
    <script src="../js/menu.js"></script>
</head>

<body>
    <header class="topHeader" id="cabecalho">
        <div id="logo">
            <a href="../index.html"><img src="../img/menu/logo.png" alt="logo gritta"></a>
        </div>
        <a href="javascript:void(0);" id="icon" onclick="myFunction()">&#9776;</a>
        <nav id="navMenu">
            <a href="../index.html">Inicio</a>
            <a href="../pages/acessorios.html">Acessórios</a>
            <a href="../pages/calcas.html">Calças</a>
            <a href="../pages/camisetas.html">Camisetas</a>
            <a href="../pages/meias.html">Meias</a>
            <a href="../pages/moletons.html">Moletons</a>
            <a href="../pages/tenis.html">Tenis</a>
        </nav>
        <div id="contaUsuario">
            <a href="../pages/carrinho.html"><img src="../img/menu/carrinho-de-compras.png" alt=""></a>
            <a href="../pages/login.html"><img src="../img/menu/perfil-de-usuario.png" alt=""></a>
        </div>
    </header>

    <section id="secCadastro">
        <article>
            <h1 id="h1Cad">Cadastro</h1>
            <form action="{{ url_for('fale_conosco') }}" method="post">
                <fieldset id="form">
                    <fieldset class="bloco">
                        <div class="dados">
                            <label>* Nome</label>
                            <input type="text" id="nome" name="nome" required>
                        </div>
                    </fieldset>
                    <fieldset class="bloco">
                        <div class="dados">
                            <label>* Sobrenome</label>
                            <input type="text" id="snome" name="snome" required>
                        </div>
                    </fieldset>
                    <fieldset class="bloco">
                        <div class="dados">
                            <label>* Usuário</label>
                            <input type="text" id="usuario" name="usuario" required>
                        </div>
                    </fieldset>
                    <fieldset class="bloco">
                        <div class="dados">
                            <label>* Data de nascimento</label>
                            <input type="date" id="data_nasc" name="data_nasc" required>
                        </div>
                    </fieldset>
                    <fieldset class="bloco">
                        <div class="dados">
                            <label>* E-mail</label>
                            <input type="email" id="email" name="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" required>
                        </div>
                    </fieldset>
                    <fieldset class="bloco">
                        <div class="dados">
                            <label>* Senha</label>
                            <input type="password" id="senha" name="senha" required>
                        </div>
                    </fieldset>
                    <fieldset class="bloco">
                        <div class="dados">
                            <label>* CPF</label>
                            <input type="text" id="cpf" name="cpf" required>
                        </div>
                    </fieldset>
                    <fieldset class="bloco">
                        <div class="dados">
                            <label>* Telefone</label>
                            <input type="tel" id="tel" name="tel" required>
                        </div>
                    </fieldset>
                    <button type="submit" class="botao" name="cadastrar">
                        Cadastrar
                    </button>
                </fieldset>
            </form>
        </article>
    </section>

</body>

</html>
